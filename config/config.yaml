# TTPLA Mask R-CNN Torchvision Configuration

project:
  name: "TTPLA Mask R-CNN Torchvision"
  task: "Object Detection and Instance Segmentation"
  framework: "PyTorch Torchvision"
  description: "Mask R-CNN baseline for detecting and segmenting TTPLA transmission line objects."

paths:
  dataset_root: "/content/data/ttpla-dataset"
  train_image_dir: "/content/data/ttpla-dataset/trainingset"
  train_annotation_file: "/content/data/ttpla-dataset/trainingset/train.json"
  test_image_dir: "/content/data/ttpla-dataset/testset"
  test_annotation_file: "/content/data/ttpla-dataset/testset/test.json"
  output_dir: "/content/outputs"
  checkpoint_dir: "/content/outputs/checkpoints"
  best_checkpoint: "/content/outputs/best_model.pth"
  last_checkpoint: "/content/outputs/last_model.pth"
  evaluator_output_dir: "/content/evaluator_outputs"
  tester_output_dir: "/content/tester_outputs"

dataset:
  name: "TTPLA"
  annotation_format: "COCO"
  train_images: 842
  test_images: 400
  num_object_classes: 4
  num_classes_with_background: 5
  classes:
    background: 0
    cable: 1
    tower_lattice: 2
    tower_tucohy: 3
    tower_wooden: 4

model:
  architecture: "Mask R-CNN"
  backbone: "ResNet-50 FPN"
  pretrained: true
  pretrained_source: "COCO"
  num_classes: 5
  replace_box_predictor: true
  replace_mask_predictor: true

training:
  device: "cuda"
  batch_size: 4
  num_epochs: 15
  learning_rate: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  num_workers: 2
  eval_every: 1
  score_threshold: 0.50
  mask_threshold: 0.50
  save_best_metric: "segmentation_ap"

augmentation:
  horizontal_flip: true
  vertical_flip: true
  random_brightness_contrast: true
  rgb_shift: true
  blur: true

evaluation:
  batch_size: 1
  score_threshold: 0.05
  visual_score_threshold: 0.30
  mask_threshold: 0.50
  num_sample_images: 10
  metrics:
    - bbox_ap
    - bbox_ap50
    - bbox_ap75
    - segm_ap
    - segm_ap50
    - segm_ap75
    - ar_1
    - ar_10
    - ar_100

testing:
  run_all_test_images: true
  max_test_images: 50
  score_threshold: 0.30
  mask_threshold: 0.50
  num_sample_images: 10
  export_json: true
  export_csv: true
  export_visualization: true

results:
  trainer:
    best_epoch: 15
    final_train_loss: 0.7378
    final_bbox_ap: 0.1915
    final_segm_ap: 0.1235

  evaluator:
    bbox_ap: 0.2146
    bbox_ap50: 0.3602
    bbox_ap75: 0.2342
    bbox_ap_small: 0.1022
    bbox_ap_medium: 0.2849
    bbox_ap_large: 0.2258
    segm_ap: 0.1214
    segm_ap50: 0.2195
    segm_ap75: 0.1254
    segm_ap_small: 0.0008
    segm_ap_medium: 0.0625
    segm_ap_large: 0.2416
    bbox_ar_100: 0.3594
    segm_ar_100: 0.2148

  tester:
    processed_images: 400
    total_predictions: 6064
    average_predictions_per_image: 15.16
    testing_time_seconds: 2867.63
    class_statistics:
      cable:
        total_predictions: 5815
        mean_score: 0.6793
        max_score: 0.9992
        mean_area: 40277.92
      tower_lattice:
        total_predictions: 249
        mean_score: 0.6073
        max_score: 0.9673
        mean_area: 76941.33

notes:
  upload_large_files_to_github: false
  recommended_large_file_storage:
    - "Google Drive"
    - "Kaggle"
    - "Hugging Face"
    - "GitHub Release"
  ignored_large_files:
    - "*.pth"
    - "*.pt"
    - "*.zip"
    - "data/"
    - "dataset/"
    - "runs/"
    - "checkpoints/"
